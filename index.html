<!DOCTYPE html>
<html>
<head>
    <title>Mental Stress Detector</title>
</head>
<body>
    <h1>Mental Stress Pattern Detector</h1>

    <form action="/predict" method="post">
        Sleep Hours: <input type="number" name="sleep" required><br><br>
        Screen Time (hrs): <input type="number" name="screen" required><br><br>
        Work Hours: <input type="number" name="work" required><br><br>
        Mood (0–3): <input type="number" name="mood" required><br><br>
        Exercise Minutes: <input type="number" name="exercise" required><br><br>

        <button type="submit">Predict Stress</button>
    </form>
</body>
</html>
